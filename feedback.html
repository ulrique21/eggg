<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eggcipe | Feedback</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: url('EggBG.jpg') center/cover fixed;
}

header {
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:#fff8e1;
}

.logo {
    font-weight:bold;
    text-decoration:none;
    color:#ffb703;
    font-size:20px;
}

.btn {
    padding:8px 12px;
    background:#ffb703;
    color:white;
    border-radius:6px;
    text-decoration:none;
    margin-left:5px;
}

.container {
    max-width:600px;
    margin:60px auto;
    background:rgba(255,255,255,0.9);
    padding:25px;
    border-radius:12px;
}

textarea {
    width:100%;
    height:150px;
    padding:10px;
    border:2px solid #ddd;
    border-radius:8px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#ffb703;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover {
    background:#f77f00;
}

.msg {
    margin-top:10px;
    color:green;
    text-align:center;
}

footer {
    margin-top:50px;
    text-align:center;
    padding:20px;
    background:#fff8e1;
}
</style>
</head>

<body>

<header>
    <a href="index.html" class="logo">🥚 Eggcipe</a>

    <div>
        <a class="btn" href="login.html">Login</a>
        <a class="btn" href="register.html">Register</a>
    </div>
</header>

<div class="container">

    <h2>Suggestion & Feedback</h2>

    <p>We appreciate your suggestions!</p>

    <label>Your Feedback:</label>
    <textarea id="feedback"></textarea>

    <button onclick="submitFeedback()">Submit</button>

    <div class="msg" id="msg"></div>

</div>

<footer>
    <a href="#">Suggestions</a> |
    <a href="#">Report</a> |
    <a href="#">Contact</a>
</footer>

<script>
function submitFeedback() {
    const text = document.getElementById("feedback").value;

    if (!text.trim()) {
        document.getElementById("msg").innerText = "Please write feedback first.";
        document.getElementById("msg").style.color = "red";
        return;
    }

    // Fake submission (no database)
    document.getElementById("msg").innerText =
        "✅ Thank you! Your feedback has been submitted (demo only).";

    document.getElementById("msg").style.color = "green";

    document.getElementById("feedback").value = "";
}
</script>

</body>
</html>
