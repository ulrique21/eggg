<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eggcipe | Report Problem</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: url('EggBG.jpg') center/cover fixed;
}

header {
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:#fff8e1;
}

.logo {
    font-weight:bold;
    color:#ffb703;
    text-decoration:none;
    font-size:20px;
}

.btn {
    padding:8px 12px;
    background:#ffb703;
    color:white;
    text-decoration:none;
    border-radius:6px;
    margin-left:5px;
}

.container {
    max-width:600px;
    margin:60px auto;
    background:rgba(255,255,255,0.95);
    padding:25px;
    border-radius:12px;
}

input, textarea {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:2px solid #ddd;
    border-radius:8px;
}

textarea {
    height:150px;
}

button {
    width:100%;
    padding:12px;
    background:#e63946;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover {
    background:#b71c1c;
}

.msg {
    text-align:center;
    margin-bottom:10px;
    color:green;
}

footer {
    margin-top:50px;
    text-align:center;
    padding:20px;
    background:#fff8e1;
}
</style>
</head>

<body>

<header>
    <a class="logo" href="index.html">🥚 Eggcipe</a>

    <div>
        <a class="btn" href="login.html">Login</a>
        <a class="btn" href="register.html">Register</a>
    </div>
</header>

<div class="container">

    <h2>Report a Problem</h2>

    <p>Tell us about any issue you found.</p>

    <input type="text" placeholder="Page URL (e.g. recipe page)">
    <textarea id="report"></textarea>

    <button onclick="submitReport()">Submit Report</button>

    <div class="msg" id="msg"></div>

</div>

<footer>
    <a href="#">Feedback</a> |
    <a href="#">Report</a> |
    <a href="#">Contact</a>
</footer>

<script>
function submitReport() {
    const text = document.getElementById("report").value;

    if (!text.trim()) {
        document.getElementById("msg").innerText = "Please describe the issue.";
        document.getElementById("msg").style.color = "red";
        return;
    }

    document.getElementById("msg").innerText =
        "✅ Report submitted (demo only - no database connected).";

    document.getElementById("msg").style.color = "green";

    document.getElementById("report").value = "";
}
</script>

</body>
</html>
